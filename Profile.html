<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>

<body class="IMPER">

  <header class="header">
    <h1>Мій профіль</h1>
   
         <table border: none;width="100%">
      <tr>
        <td class ="home"><a href="index.html">Home</a></li>
        <td class = "profile"><a href="profile.html">Profile</a></li>
            <td class="news"><a href="LastNews.html"><h2>Last News</h2></a></td>
      </tr>
      </table>
    
  </header>

  <main>
    <h2>Введіть свої данні профілю</h2>
    <form>
      <label for="name">Ім’я:</label><br>
      <input type="text" id="name" name="name" placeholder="Введіть ім’я та прізвище"><br><br>

      <label for="email">Email:</label><br>
      <input type="email" id="email" name="email" placeholder="testedovi@gmail.com"><br><br>

      <label for="phone">Телефон:</label><br>
      <input type="tel" id="phone" name="phone" placeholder="+380"><br><br>

      <label for="bio">Про себе:</label><br>
      <textarea id="bio" name="bio" rows="4" cols="40" placeholder="Напишіть декілька слів про себе"></textarea><br><br>

      <input type="submit" value="Зберегти">
    </form>
  </main>

  </footer>
